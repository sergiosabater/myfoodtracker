name: my_food_tracker
description: "Track your calories with AI-powered food recognition"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Animations
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  animated_text_kit: ^4.2.2
  page_transition: ^2.0.9
  confetti: ^0.7.0
  liquid_swipe: ^3.1.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.0.0

  # Database - Drift (SQLite)
  drift: ^2.20.0
  drift_flutter: ^0.2.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.0.0
  path: ^1.9.0
  path_provider: ^2.1.0

  # Charts
  fl_chart: ^0.69.0

  # Camera & Media
  image_picker: ^1.2.1

  # Subscription Management (Freemium) - RevenueCat
  purchases_flutter: ^8.0.0

  # Other
  visibility_detector: ^0.4.0
  marquee: ^2.3.0
  riverpod: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  drift_dev: ^2.20.0

flutter:
  uses-material-design: true